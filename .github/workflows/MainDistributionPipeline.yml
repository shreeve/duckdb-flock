# Main extension distribution pipeline.
#
# Builds the harbor extension across the full upstream non-opt-in
# matrix exposed by extension-ci-tools v1.5-variegata
# (config/distribution_matrix.json). With `reduced_ci_mode: 'disabled'`
# (PR-7a) the matrix is:
#
#   linux:   linux_amd64, linux_arm64
#   osx:     osx_amd64, osx_arm64
#   windows: windows_amd64, windows_amd64_mingw
#   wasm:    wasm_mvp, wasm_eh, wasm_threads
#
# That's 9 build targets + matrix-generate + the architecture-guard
# (single duckdb_httplib::Server owner) = 11 total CI rows.
#
# Pre-PR-7a we ran `reduced_ci_mode: 'enabled'` (5 build targets:
# linux_amd64, osx_arm64, windows_amd64, windows_amd64_mingw, wasm_mvp)
# while iterating on the protocol surface (PR-1 through PR-6/6.1).
# That kept feedback fast but left linux_arm64, osx_amd64, wasm_eh,
# and wasm_threads uncovered. PR-7a flips the mode to 'disabled' so
# every PR after this one runs against the full matrix before merging
# — catching arch-specific regressions BEFORE they reach v0.1 release.
#
# Adapted from duckdb-quack's MainDistributionPipeline.yml; same
# structure, same pinned ci_tools_version, same calling convention.

name: Main Extension Distribution Pipeline
# Trigger on every code change. `paths-ignore` keeps pure-docs commits
# (README, CHANGELOG, the upstream-*-patches notes, .editorconfig,
# LICENSE) from burning ~30 cross-platform runner-minutes on changes
# that can't possibly affect the binary. Mixed commits (code + docs)
# still trigger normally — `paths-ignore` only short-circuits when
# every changed path matches the list. Workflow-file changes are NOT
# in the ignore list, so editing this file itself still triggers a
# rebuild (which is what validates the change).
on:
  push:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CHANGELOG.md'
      - '.editorconfig'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CHANGELOG.md'
      - '.editorconfig'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.2
      ci_tools_version: v1.5-variegata
      extension_name: harbor
      reduced_ci_mode: 'disabled'

  # On every tag matching v*, take the per-platform .duckdb_extension(.wasm)
  # artifacts the matrix produced and attach them to the corresponding
  # GitHub Release. Each platform's binary lands in the release with a
  # distinct, platform-tagged filename so users can `wget` the right one
  # for their machine without unzipping anything.
  #
  # The release MUST already exist (gh release create v<X.Y.Z> ahead of
  # pushing the tag, or use the GitHub UI). This job uploads ASSETS to an
  # existing release; it does NOT create the release. That keeps release
  # NOTES under explicit human authorship while binary distribution
  # automates.
  #
  # Implementation note: upstream extension-ci-tools' artifact names are
  # `<ext>-<duckdb_ver>-extension-<platform>` and contain
  # `harbor.duckdb_extension` for native platforms,
  # `harbor.duckdb_extension.wasm` for wasm platforms. We rename to
  # `harbor.<platform>.duckdb_extension[.wasm]` for end-user clarity in
  # the release listing.
  attach-release-binaries:
    name: Attach platform binaries to GitHub Release
    needs: duckdb-stable-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all matrix artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: harbor-v1.5.2-extension-*

      - name: Flatten + rename per platform
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for dir in artifacts/harbor-v1.5.2-extension-*; do
            platform="${dir##*-extension-}"
            if [ -f "$dir/harbor.duckdb_extension" ]; then
              cp "$dir/harbor.duckdb_extension" \
                 "release-assets/harbor.${platform}.duckdb_extension"
            elif [ -f "$dir/harbor.duckdb_extension.wasm" ]; then
              cp "$dir/harbor.duckdb_extension.wasm" \
                 "release-assets/harbor.${platform}.duckdb_extension.wasm"
            else
              echo "WARN: no extension binary in $dir" >&2
              ls -la "$dir"
              exit 1
            fi
          done
          ls -lh release-assets/

      - name: Upload to the GitHub Release for this tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # --clobber so re-runs overwrite cleanly without manual cleanup.
          gh release upload "$TAG" \
            release-assets/harbor.*.duckdb_extension* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
